# .github/workflows/publish-guide.yml
# ZX Cloud Security — Publish Approved Guide

name: Publish Guide

on:
  workflow_dispatch:
    inputs:
      guide_filename:
        description: 'Guide filename to publish (e.g. aws-scp-best-practices.md)'
        required: true
      token:
        description: 'Approval token (validated by Lambda before trigger)'
        required: false
        default: ''

jobs:
  publish:
    name: Publish Guide
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Publish guide
        run: python src/publish.py --filename "${{ inputs.guide_filename }}" --token "${{ inputs.token }}"