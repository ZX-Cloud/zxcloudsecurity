name: Daily Security Feed Pipeline

on:
  schedule:
    - cron: '0 4 * * *'   # 4am UTC daily (allows for GitHub Actions delay)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true   # needed for Hugo PaperMod theme

      # ── Python setup ────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r src/requirements.txt

      # ── Hugo setup ──────────────────────────────────────────────────────────
      - name: Install Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.162.1'
          extended: true

      # ── Pipeline ────────────────────────────────────────────────────────────
      - name: Scrape feeds
        run: python src/feed_scraper.py

      - name: Enrich with Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/enricher.py

      - name: Generate Hugo content
        run: python src/generate.py

      - name: Commit data files back to repo
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add site/data/seen_ids.json site/data/stats.json
          git diff --staged --quiet || git commit -m "update data files [skip ci]"
          git push

      - name: Build Hugo site
        run: hugo --minify
        working-directory: site

      # ── Deploy ──────────────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Deploy to S3
        run: aws s3 sync site/public/ s3://zxcloudsecurity-site --delete

      - name: Upload enriched feed to S3
        run: aws s3 cp src/enriched_feed.json s3://zxcloudsecurity-site/enriched_feed.json

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Send daily email digest
        env:
          AWS_DEFAULT_REGION: eu-west-1
        run: |
          aws lambda invoke \
            --function-name zxcloudsecurity-send-digest \
            --region eu-west-1 \
            --payload '{}' \
            response.json
          cat response.json

      # ── Notify on failure ───────────────────────────────────────────────────
      - name: Pipeline summary
        if: always()
        run: |
          echo "Pipeline completed at $(date)"
          echo "Feeds scraped, enriched, and deployed to zxcloudsecurity.co.uk"
