# .github/workflows/seo-dashboard.yml
# ZX Cloud Security — Weekly SEO Snapshot (email-only)

name: SEO Dashboard

on:
  schedule:
    - cron: '0 7 * * 1'   # Monday 07:00 UTC
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual trigger'

jobs:
  snapshot:
    name: Fetch SEO snapshot and email digest
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests boto3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.2.1
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Run SEO snapshot
        env:
          DATAFORSEO_LOGIN:    ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
          SES_FROM_ADDRESS:    ${{ secrets.SES_FROM_ADDRESS }}
          SES_TO_ADDRESS:      ${{ secrets.SES_TO_ADDRESS }}
          AWS_REGION:          ${{ secrets.AWS_REGION }}
        run: python src/seo_dashboard.py

      - name: Commit snapshot history
        run: |
          git config user.name "ZX SEO Dashboard"
          git config user.email "actions@github.com"
          git add data/seo_history/
          git diff --staged --quiet || git commit -m "chore: weekly SEO snapshot $(date -u +%Y-%m-%d)"
          git push