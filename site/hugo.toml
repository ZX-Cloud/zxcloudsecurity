baseURL = "https://zxcloudsecurity.co.uk"
locale = "en-GB"
title = "ZX Cloud Security"
theme = "PaperMod"
paginate = 20
enableRobotsTXT = true
buildDrafts = false
buildFuture = false

[params]
  env = "production"
  title = "ZX Cloud Security"
  description = "Daily cloud security advisories, CVEs, and threat intelligence for AWS, GCP, and Azure security architects."
  keywords = ["cloud security", "AWS security", "GCP security", "Azure security", "CVE", "security advisories"]
  author = "ZX Cloud Security"
  DateFormat = "2 January 2006"
  defaultTheme = "dark"
  disableThemeToggle = false
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = false
  hidemeta = false
  ShowFullTextinRSS = true
  googleAnalytics = "G-V7188QRTVW"
  favicon = "/favicon.ico"
  favicon16x16 = "/favicon-16x16.png"
  favicon32x32 = "/favicon-32x32.png"
  apple_touch_icon = "/apple-touch-icon.png"
  # Default image for schema/OG — create a 1200x630px branded image and deploy to /static/images/
  # Uncomment once the image exists:
  # images = ["https://zxcloudsecurity.co.uk/images/zxcloudsecurity-og-default.png"]

  [params.homeInfoParams]
    Title = "Cloud Security Intelligence"
    Content = "Daily advisories, CVEs, and threat intelligence across AWS, GCP, and Azure, curated for security architects. This is a very much a MVP and is being developed daily with added functionality"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/ZX-Cloud"

[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[[menu.main]]
  identifier = "menu-aws"
  name = "AWS"
  url = "/categories/aws/"
  weight = 10
[[menu.main]]
  identifier = "menu-gcp"
  name = "GCP"
  url = "/categories/gcp/"
  weight = 20
[[menu.main]]
  identifier = "menu-azure"
  name = "Azure"
  url = "/categories/azure/"
  weight = 30
[[menu.main]]
  identifier = "menu-general"
  name = "General"
  url = "/categories/general/"
  weight = 40

[[menu.main]]
  identifier = "menu-guides"
  name = "Guides"
  url = "/guides/"
  weight = 45

[[menu.main]]
  identifier = "menu-search"
  name = "Search"
  url = "/search/"
  weight = 55

[[menu.main]]
  identifier = "menu-subscribe"
  name = "Subscribe"
  url = "/subscribe/"
  weight = 50

[[menu.main]]
  identifier = "menu-archive"
  name = "Archive"
  url = "/archive/"
  weight = 60

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
	